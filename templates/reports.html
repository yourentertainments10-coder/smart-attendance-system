<!DOCTYPE html>
<html>
<head>
    <title>Generate Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<nav class="navbar">
    <div class="nav-title"> Dashboard</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/analytics">Analytics</a>
        <a href="/attendance">Attendance</a>
        <a href="/class_monitor">Monitor</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="page-center">
    <div class="form-card">

        <h1 class="title">Generate Reports</h1>
        <p class="subtitle">Create attendance and engagement reports</p>

        <!-- DAILY -->
        <div class="section">
            <h3>Daily Attendance</h3>

            <form method="POST" action="/reports/daily">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>

                <div class="form-group">
                    <label>Format</label>
                    <select name="format">
                        <option>PDF</option>
                    </select>
                </div>

                <button name="action" value="daily" class="btn btn-primary">Generate</button>
            </form>
        </div>

        <!-- MONTHLY -->
        <div class="section">
            <h3>Monthly Report</h3>

            <form method="POST" action="/reports/monthly">
                <div class="form-group">
                    <label>Format</label>
                    <select name="format">
                        <option>PDF</option>
                    </select>
                </div>

                <button name="action" value="monthly" class="btn btn-primary">Generate</button>
            </form>
        </div>

        <!-- DEFAULTERS -->
        <div class="section">
            <h3>Defaulters</h3>

            <form method="POST"action="/reports/defaulters">
                <div class="form-group">
                    <label>Absent Days Threshold</label>
                    <input type="number" name="days" value="3" min="1" max="30">
                </div>

                <button name="action" value="defaulters" class="btn btn-primary">Generate</button>
            </form>
        </div>

        <!-- RECENT -->
        <div class="section">
            <h3>Recent Reports</h3>
            <ul class="report-list">
                {% for report in reports %}
                    <li>
                        <a href="{{ report.file }}">{{ report.name }}</a>
                    </li>
                {% endfor %}
            </ul>
        </div>

    </div>
</div>

</body>
</html>
