<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Face Recognition Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-title">
            <h1> Live Face Recognition</h1>
            <p>Look at camera - AI will mark attendance automatically</p>
        </div>

        <div class="status-badge" id="status-box" style="display: none;">
            Status message will appear here
        </div>

        <div class="camera-container">
            <img id="camera-feed" src="{{ url_for('attendance.attendance_feed') }}" class="camera-feed" alt="Live Camera">
        </div>

        <div class="action-bar">
            <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <audio id="successSound" src="{{ url_for('static', filename='sounds/success.mp3') }}" preload="auto"></audio>
<script>
let audioUnlocked = false;
let previousMessage = "";

const sound = document.getElementById("successSound");

// Unlock audio once
document.body.addEventListener("click", async () => {
    if (!audioUnlocked) {
        try {
            await sound.play();
            sound.pause();
            sound.currentTime = 0;
            audioUnlocked = true;
            console.log("Audio unlocked");
        } catch (err) {
            console.log(err);
        }
    }
}, { once: true });

function playBeep() {
    if (!audioUnlocked) return;

    sound.currentTime = 0;

    sound.play()
        .then(() => console.log("Beep played"))
        .catch(err => console.log("Play error:", err));
}

function showStatus(message, type="success") {

    if (message !== previousMessage) {
        playBeep();
        previousMessage = message;
    }

    const box = document.getElementById("status-box");

    box.textContent = message;
    box.className = `status-badge status-${type}`;
    box.style.display = "inline-block";

    setTimeout(() => {
        box.style.display = "none";
    }, 3000);
}

setInterval(async () => {
    try {
        const res = await fetch('/attendance_status');
        const data = await res.json();

        if (data.message && data.message.trim() !== "") {

            let type = data.message.includes("ALREADY")
                ? "error"
                : "success";

            showStatus(data.message, type);
        }

    } catch (err) {
        console.log(err);
    }
}, 1000);
</script>
</div>
</body>
</html>
