<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Face Recognition Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-title">
            <h1> Live Face Recognition</h1>
            <p>Look at camera - AI will mark attendance automatically</p>
        </div>

        <div class="status-badge" id="status-box" style="display: none;">
            Status message will appear here
        </div>

        <div class="camera-container">
            <img id="camera-feed" src="{{ url_for('attendance.attendance_feed') }}" class="camera-feed" alt="Live Camera">
        </div>

        <div class="action-bar">
            <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <audio id="successSound" src="{{ url_for('static', filename='sounds/success.mp3') }}" preload="auto"></audio>
        <script>
    let lastMessage = "";

    function triggerBeep(msg) {
        if (msg && msg !== lastMessage) {
            document.getElementById("successSound").play().catch(()=>{});
            lastMessage = msg;
        }
    }

    function showStatus(message, type="success") {
        triggerBeep(message);

        const box = document.getElementById("status-box");
        box.textContent = message;
        box.className = `status-badge status-${type}`;
        box.style.display = "inline-block";

        setTimeout(() => {
            box.style.display = "none";
        }, 3000);
    }

    setInterval(() => {
        fetch('/attendance_status')
            .then(res => res.json())
            .then(data => {
                if (data.message && data.message !== "" && data.message !== lastMessage) {
                    let type = data.message.includes("ALREADY") ? "error" : "success";
                    showStatus(data.message, type);
                }
            });
    }, 1000);
</script>
</div>
</body>
</html>
