<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Face Recognition Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-title">
            <h1>📸 Live Face Recognition</h1>
            <p>Look at camera - AI will mark attendance automatically</p>
        </div>

        <div class="status-badge" id="status-box" style="display: none;">
            Status message will appear here
        </div>

        <div class="camera-container">
            <img id="camera-feed" src="{{ url_for('attendance.attendance_feed') }}" class="camera-feed" alt="Live Camera">
        </div>

        <div class="action-bar">
            <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <audio id="beep" src="{{ url_for('static', filename='sounds/success.mp3') }}" preload="auto"></audio>
        <script>
            let lastMessage = "";
            function triggerBeep(msg) {
                if (msg !== lastMessage) {
                    document.getElementById("beep").play().catch(()=>{});
                    lastMessage = msg;
                }
            }

            function showStatus(message, type="success") {
                triggerBeep(message);
                const box = document.getElementById("status-box");
                box.textContent = message;
                box.className = `status-badge status-${type}`;
                box.style.display = "inline-block";
                
                setTimeout(() => {
                    box.style.display = "none";
                    if (type === "success") {
                        window.location.href = "/";
                    }
                }, 4000);
            }

            // Listen for status messages from server (via query params or SSE)
            window.addEventListener('message', function(event) {
                if (event.data.type === 'attendance_status') {
                    showStatus(event.data.message, event.data.status);
                }
            });
        </script>
    </div>
</body>
</html>
