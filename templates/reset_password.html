<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password - Smart Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1976D2; }
        .alert { padding: 12px; margin-bottom: 20px; border-radius: 8px; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #2196F3; text-decoration: none; }
        .demo { text-align: center; margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🔄 Reset Password</h1>
    <p>(Enter username + new password)</p>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-error">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}
    
    <form method="POST">
        <div class="form-group">
            <label>Username:</label>
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>
        <div class="form-group">
            <label>New Password:</label>
            <input type="password" name="new_password" placeholder="New Password" required minlength="6">
        </div>
        <div class="form-group">
            <label>Confirm New Password:</label>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="6">
        </div>
        <button type="submit">Reset Password</button>
    </form>
    
    <div class="demo">
        Demo: <strong>admin</strong> / new password
    </div>
    
    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
